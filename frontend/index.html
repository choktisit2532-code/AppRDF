<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TongServiceIT — NexInvoice</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
<section id="loginView" class="login-shell">
  <form id="loginForm" class="login-card">
    <div class="brand">TongServiceIT</div>
    <p class="muted">ระบบจัดการลูกค้าและเอกสาร</p>
    <div class="field"><label>อีเมล</label><input id="loginEmail" type="email" required autocomplete="username" /></div>
    <div class="field"><label>รหัสผ่าน</label><input id="loginPassword" type="password" required minlength="8" autocomplete="current-password" /></div>
    <p id="loginError" class="error"></p>
    <button class="btn btn-primary" style="width:100%" type="submit">เข้าสู่ระบบ</button>
  </form>
</section>

<div id="appView" class="app-shell hidden">
  <aside class="sidebar">
    <h1>TongServiceIT</h1>
    <button class="nav-btn active" data-page="dashboard">Dashboard</button>
    <button class="nav-btn" data-page="documents">เอกสาร</button>
    <button class="nav-btn" data-page="create-document">สร้างเอกสาร</button>
    <button class="nav-btn" data-page="customers">ลูกค้า</button>
    <button class="nav-btn" data-page="settings">ตั้งค่าร้าน</button>
    <button id="logoutButton" class="nav-btn">ออกจากระบบ</button>
  </aside>
  <main class="content">
    <header class="topbar"><h2 id="pageTitle">Dashboard</h2><div id="userLabel" class="muted"></div></header>

    <section id="page-dashboard" class="page">
      <div class="grid grid-3">
        <div class="card"><div class="muted">จำนวนเอกสาร</div><div id="statDocuments" class="stat">0</div></div>
        <div class="card"><div class="muted">ยอดรวมเอกสารล่าสุด</div><div id="statTotal" class="stat">฿0.00</div></div>
        <div class="card"><div class="muted">จำนวนลูกค้า</div><div id="statCustomers" class="stat">0</div></div>
      </div>
      <div class="card" style="margin-top:16px"><h3>เอกสารล่าสุด</h3><div id="recentDocuments"></div></div>
    </section>

    <section id="page-documents" class="page hidden">
      <div class="card"><div class="toolbar"><h3>รายการเอกสาร</h3><button class="btn btn-primary" data-go="create-document">สร้างเอกสาร</button></div><div id="documentsTable"></div></div>
    </section>

    <section id="page-customers" class="page hidden">
      <div class="grid grid-2">
        <form id="customerForm" class="card"><h3>เพิ่มลูกค้า</h3>
          <div class="field"><label>ชื่อ *</label><input name="name" required /></div>
          <div class="field"><label>อีเมล</label><input name="email" type="email" /></div>
          <div class="field"><label>โทรศัพท์</label><input name="phone" /></div>
          <div class="field"><label>ที่อยู่</label><textarea name="address"></textarea></div>
          <button class="btn btn-primary" type="submit">บันทึกลูกค้า</button>
        </form>
        <div class="card"><h3>รายชื่อลูกค้า</h3><div id="customersTable"></div></div>
      </div>
    </section>

    <section id="page-create-document" class="page hidden">
      <form id="documentForm" class="card">
        <div class="toolbar"><h3>สร้างเอกสารใหม่</h3><button class="btn btn-primary" type="submit">บันทึกเอกสาร</button></div>
        <div class="form-row">
          <div class="field"><label>ประเภทเอกสาร</label><select name="documentType" required>
            <option value="quotation">ใบเสนอราคา</option><option value="invoice">ใบแจ้งหนี้</option><option value="receipt">ใบเสร็จรับเงิน</option><option value="repair_order">ใบรับซ่อม</option><option value="delivery_note">ใบส่งมอบงาน</option><option value="billing_note">ใบวางบิล</option><option value="deposit_receipt">ใบรับเงินมัดจำ</option>
          </select></div>
          <div class="field"><label>ลูกค้า</label><select id="documentCustomer" name="customerId" required></select></div>
          <div class="field"><label>วันที่ออก</label><input name="issueDate" type="date" required /></div>
          <div class="field"><label>ครบกำหนด</label><input name="dueDate" type="date" /></div>
          <div class="field"><label>ส่วนลด</label><input id="discountAmount" name="discountAmount" type="number" min="0" step="0.01" value="0" /></div>
          <div class="field"><label>ลายเซ็น</label><select name="signatureMode"><option value="none">ไม่แสดง</option><option value="blank">เว้นช่องเซ็น</option><option value="digital">ลายเซ็นดิจิทัล</option></select></div>
        </div>
        <div class="field"><label>หมายเหตุ</label><textarea name="notes"></textarea></div>
        <h3>รายการ</h3><div id="itemsContainer"></div><button id="addItemButton" type="button" class="btn btn-secondary">+ เพิ่มรายการ</button>
        <div class="summary" style="margin-top:18px"><div class="summary-row"><span>ยอดก่อนลด</span><strong id="previewSubtotal">฿0.00</strong></div><div class="summary-row"><span>ส่วนลด</span><strong id="previewDiscount">฿0.00</strong></div><div class="summary-row total"><span>ยอดประมาณการ</span><strong id="previewTotal">฿0.00</strong></div><small class="muted">ยอดจริงและ VAT จะคำนวณใหม่ที่ Backend</small></div>
      </form>
    </section>

    <section id="page-settings" class="page hidden">
      <form id="settingsForm" class="card"><div class="toolbar"><h3>ข้อมูลร้าน</h3><button class="btn btn-primary" type="submit">บันทึก</button></div>
        <div class="form-row">
          <div class="field"><label>ชื่อร้าน</label><input name="companyName" required /></div>
          <div class="field"><label>โทรศัพท์</label><input name="phone" /></div>
          <div class="field"><label>อีเมล</label><input name="email" type="email" /></div>
          <div class="field"><label>เลขผู้เสียภาษี</label><input name="taxId" /></div>
          <div class="field"><label>ชื่อผู้ลงนาม</label><input name="signerName" /></div>
          <div class="field"><label>ตำแหน่งผู้ลงนาม</label><input name="signerPosition" /></div>
          <div class="field"><label>Logo storage path</label><input name="logoStoragePath" /></div>
          <div class="field"><label>Signature storage path</label><input name="signatureStoragePath" /></div>
          <div class="field"><label>จด VAT แล้ว</label><select name="isVatRegistered"><option value="false">ยังไม่จด VAT</option><option value="true">จด VAT แล้ว</option></select></div>
          <div class="field"><label>อัตรา VAT (%)</label><input name="defaultTaxRate" type="number" min="0" max="100" step="0.01" /></div>
        </div>
        <div class="field"><label>ที่อยู่</label><textarea name="address"></textarea></div>
      </form>
    </section>
  </main>
</div>
<div id="toast" class="toast hidden"></div>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script src="./config.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
